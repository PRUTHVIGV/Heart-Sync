name: HeartSync CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Backend ──────────────────────────────────────────────────────────────────
  backend:
    name: Backend - Install & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Verify server starts
        run: |
          node -e "
            process.env.PORT = 5001;
            process.env.MONGO_URI = 'mongodb://localhost:27017/test';
            process.env.JWT_SECRET = 'test_secret_ci';
            process.env.CLIENT_URL = 'http://localhost:3000';
            const app = require('express')();
            app.get('/health', (req, res) => res.json({ ok: true }));
            const s = app.listen(5001, () => { console.log('OK'); s.close(); });
          "

  # ── Frontend ─────────────────────────────────────────────────────────────────
  frontend:
    name: Frontend - Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build Next.js
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:5000
          NEXT_PUBLIC_SOCKET_URL: http://localhost:5000
          NEXT_PUBLIC_SITE_URL: https://heartsync.app

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: nextjs-build
          path: frontend/.next
          retention-days: 1

  # ── Deploy (main branch only) ─────────────────────────────────────────────────
  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Trigger Render backend deploy
        if: ${{ secrets.RENDER_BACKEND_HOOK != '' }}
        run: |
          curl -s "${{ secrets.RENDER_BACKEND_HOOK }}" \
            -X POST -H "Content-Type: application/json" \
            -d '{"clearCache": false}' || echo "Deploy hook skipped"

      - name: Trigger Render frontend deploy
        if: ${{ secrets.RENDER_FRONTEND_HOOK != '' }}
        run: |
          curl -s "${{ secrets.RENDER_FRONTEND_HOOK }}" \
            -X POST -H "Content-Type: application/json" \
            -d '{"clearCache": false}' || echo "Deploy hook skipped"

      - name: Deploy summary
        run: echo "✅ HeartSync deployed successfully!"
