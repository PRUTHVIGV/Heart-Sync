name: HeartSync CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Backend ──────────────────────────────────────────
  backend:
    name: Backend - Install & Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Check for vulnerabilities
        run: npm audit --audit-level=high

  # ── Frontend ─────────────────────────────────────────
  frontend:
    name: Frontend - Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:5000
          NEXT_PUBLIC_SOCKET_URL: http://localhost:5000

  # ── Deploy (only on main push) ────────────────────────
  deploy:
    name: Deploy to AWS
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & push backend image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/heartsync-backend:$IMAGE_TAG ./backend
          docker push $ECR_REGISTRY/heartsync-backend:$IMAGE_TAG
          docker tag $ECR_REGISTRY/heartsync-backend:$IMAGE_TAG $ECR_REGISTRY/heartsync-backend:latest
          docker push $ECR_REGISTRY/heartsync-backend:latest

      - name: Build & push frontend image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/heartsync-frontend:$IMAGE_TAG ./frontend
          docker push $ECR_REGISTRY/heartsync-frontend:$IMAGE_TAG
          docker tag $ECR_REGISTRY/heartsync-frontend:$IMAGE_TAG $ECR_REGISTRY/heartsync-frontend:latest
          docker push $ECR_REGISTRY/heartsync-frontend:latest

      - name: Deploy to ECS
        run: |
          aws ecs update-service \
            --cluster heartsync-cluster \
            --service heartsync-backend \
            --force-new-deployment

          aws ecs update-service \
            --cluster heartsync-cluster \
            --service heartsync-frontend \
            --force-new-deployment
